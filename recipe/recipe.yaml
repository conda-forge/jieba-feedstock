schema_version: 1

context:
  name: jieba
  version: "0.42.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 055ca12f62674fafed09427f176506079bc135638a14e23e25be909131928db2

build:
  number: 3
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - jieba
      pip_check: true
      python_version: ${{ python_min }}

about:
  # No license in MANIFEST - See https://github.com/fxsjy/jieba/pull/457
  license_file: LICENSE
  license: MIT
  summary: Chinese Words Segementation Utilities
  homepage: https://github.com/fxsjy/jieba
  repository: https://github.com/fxsjy/jieba
  documentation: https://github.com/fxsjy/jieba

extra:
  recipe-maintainers:
    - pmlandwehr
    - jan-janssen
